services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waitloop
      POSTGRES_PASSWORD: waitloop
      POSTGRES_DB: waitloop
    volumes:
      - waitloop-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waitloop"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://waitloop:waitloop@db:5432/waitloop
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Optional: real login emails. Without these, magic links print to `docker compose logs app`.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  waitloop-db:
